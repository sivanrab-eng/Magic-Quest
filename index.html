<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Potter: Your Story ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --slate: #0b0e1a;
    --red-griffindor: #740001;
  }

  body {
    font-family: 'Noto Serif Hebrew', serif;
    background: var(--slate);
    color: #e2e8f0;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  header { padding: 2rem; text-align: center; }
  h1 { font-family: 'Cinzel Decorative'; color: var(--gold); text-shadow: 0 0 15px rgba(212,168,67,0.5); }

  .game-container {
    max-width: 600px;
    width: 90%;
    background: rgba(21, 26, 46, 0.8);
    backdrop-filter: blur(10px);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    position: relative;
  }

  .story-text { 
    font-size: 1.4rem; 
    line-height: 1.8; 
    margin-bottom: 2rem; 
    min-height: 150px;
    color: #cbd5e1;
  }
  
  .choices-grid { display: flex; flex-direction: column; gap: 1.2rem; }
  
  .choice-btn {
    background: linear-gradient(135deg, rgba(212,168,67,0.1), rgba(212,168,67,0.05));
    border: 1px solid rgba(212,168,67,0.4);
    color: var(--gold);
    padding: 1.2rem;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    text-align: right;
    font-weight: bold;
    font-family: 'Noto Serif Hebrew', serif;
  }

  .choice-btn:hover { 
    background: var(--gold); 
    color: black; 
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(212,168,67,0.3);
  }

  .spell-section { display: none; text-align: center; animation: fadeIn 0.5s; }
  #spell-input {
    padding: 15px; border-radius: 10px; border: 2px solid var(--gold);
    background: #1e293b; color: white; width: 80%; text-align: center; font-size: 1.3rem;
    margin-bottom: 1rem; outline: none;
    font-family: 'Noto Serif Hebrew', serif;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .inventory { 
    margin-top: 2rem; 
    font-size: 0.9rem; 
    color: var(--gold); 
    border-top: 1px solid rgba(212,168,67,0.2);
    padding-top: 1rem;
  }
</style>
</head>
<body>

<header>
  <h1>הארי פוטר: המסע שלך</h1>
</header>

<div class="game-container">
  <div id="emoji-header" style="font-size: 3.5rem; text-align: center; margin-bottom: 1.5rem;">⚡</div>
  
  <div class="story-text" id="story-display">
    שלום לך, קוסמת צעירה. את עומדת מול המצנפת הממיינת. היא לוחשת לך: "אני רואה בך אומץ רב... לאן תרצי להשתבץ?"
  </div>
  
  <div class="choices-grid" id="choices-container">
    <button class="choice-btn" onclick="startStory('griffindor')">🦁 גריפינדור - אני אמיצה ומוכנה להרפתקה!</button>
    <button class="choice-btn" onclick="startStory('slytherin')">🐍 סלית'רין - אני שאפתנית ומחפשת כוח!</button>
  </div>

  <div class="spell-section" id="spell-section">
    <p id="instruction-text" style="margin-bottom: 1rem; font-style: italic;"></p>
    <input type="text" id="spell-input" placeholder="הקלידי את הלחש..." autocomplete="off">
    <button class="choice-btn" style="width: auto; padding: 0.8rem 2rem;" onclick="castSpell()">הטיל לחש! ✨</button>
  </div>

  <div class="inventory" id="inventory">תיק קסמים: ריק</div>
</div>

<script>
let state = {
  house: '',
  location: 'start',
  inventory: [],
  currentSpell: ''
};

const storyData = {
  griffindor: {
    emoji: '🦁',
    text: "המצנפת צועקת: 'גריפינדור!' את הולכת במסדרון ופתאום רואה את האגריד. הוא צריך עזרה לפתוח תיבה נעולה. איזה לחש פותח דלתות ומנעולים?",
    instruction: "לחשי את הלחש לפתיחת מנעולים:",
    answer: "אלוהומורה",
    success: "התיבה נפתחה! האגריד נותן לך 'נוצת עוף חול'.",
    item: "נוצת עוף חול",
    next: "פתאום מופיע סוהרסן מקפיא! מהר, מהו הלחש שמזמן פטרונוס?"
  },
  slytherin: {
    emoji: '🐍',
    text: "המצנפת צועקת: 'סלית'רין!' את יורדת לצינוק ופוגשת את סנייפ. הוא רוצה שתמצאי מרכיב לשיקוי בחדר חשוך. איזה לחש יאיר לך את הדרך?",
    instruction: "לחשי את הלחש ליצירת אור:",
    answer: "לומוס",
    success: "החדר מואר! מצאת 'ניב של בסיליסק'.",
    item: "ניב של בסיליסק",
    next: "הדלת ננעלה מאחורייך! איך תפתחי אותה?"
  }
};

function startStory(house) {
  state.house = house;
  state.location = 'step1';
  updateUI();
}

function updateUI() {
  const data = storyData[state.house];
  document.getElementById('emoji-header').textContent = data.emoji;
  document.getElementById('story-display').textContent = data.text;
  document.getElementById('choices-container').style.display = 'none';
  document.getElementById('spell-section').style.display = 'block';
  document.getElementById('instruction-text').textContent = data.instruction;
  state.currentSpell = data.answer;
}

function castSpell() {
  const input = document.getElementById('spell-input').value.trim();
  const data = storyData[state.house];

  if (input === state.currentSpell) {
    if (state.location === 'step1') {
      state.inventory.push(data.item);
      document.getElementById('inventory').textContent = "תיק קסמים: " + state.inventory.join(", ");
      
      document.getElementById('story-display').textContent = data.success + " " + data.next;
      
      if (state.house === 'griffindor') state.currentSpell = "אקספקטו פטרונום";
      else state.currentSpell = "אלוהומורה";
      
      state.location = 'step2';
      document.getElementById('spell-input').value = "";
    } else {
      victory();
    }
  } else {
    document.getElementById('spell-input').style.borderColor = 'red';
    setTimeout(() => document.getElementById('spell-input').style.borderColor = 'var(--gold)', 500);
  }
}

function victory() {
  document.getElementById('spell-section').style.display = 'none';
  document.getElementById('emoji-header').textContent = '🏆';
  document.getElementById('story-display').innerHTML = `
    <div style="text-align: center;">
      <h2 style="color: #d4a843;">כל הכבוד, קוסמת!</h2>
      <p>השלמת את הפרק הראשון בסיפור שלך בהוגוורטס.</p>
      <p>אספת: <strong>${state.inventory.join(", ")}</strong></p>
      <button class="choice-btn" onclick="location.reload()">התחילי סיפור חדש</button>
    </div>
  `;
}

document.getElementById('spell-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') castSpell();
});
</script>
</body>
</html>
