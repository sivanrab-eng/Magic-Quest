function chooseHouse(h) {
  house = h;
  currentHouse = h === 'griffindor' ? 'גריפינדור 🦁' : "סלית'רין 🐍";
  document.getElementById('house-label').textContent = currentHouse;
  document.getElementById('score-bar').style.display = 'flex';
  document.getElementById('main-choices').style.display = 'none';
  goToStep(h === 'griffindor' ? 'griffindor_intro' : 'slytherin_intro');
}

function goToStep(stepKey) {
  currentPath = stepKey;
  const data = S[stepKey];
  if (!data) { showShop(); return; }

  const container = document.getElementById('game-container');
  container.classList.remove('scene-fade');
  void container.offsetWidth;
  container.classList.add('scene-fade');

  const speakerEl = document.getElementById('speaker');
  if (data.speaker) { speakerEl.textContent = data.speaker + ':'; speakerEl.style.display = 'block'; }
  else { speakerEl.style.display = 'none'; }

  document.getElementById('emoji-header').textContent = data.emoji;
  document.getElementById('story-display').innerHTML = data.text;
  document.getElementById('spell-section').style.display = 'none';
  document.getElementById('branch-choices').style.display = 'none';
  document.getElementById('shop-section').style.display = 'none';

  if (data.type === 'narrative') {
    showChoices(data.choices);
  } else if (data.type === 'spell') {
    document.getElementById('spell-section').style.display = 'block';
    document.getElementById('hint-text').textContent = data.hint;
    document.getElementById('spell-input').value = "";
    document.getElementById('feedback').textContent = "";
    document.getElementById('extra-hint-box').style.display = 'none';
    document.getElementById('extra-hint-btn').style.display = 'block';
    usedExtraHint = false;
    failedAttempts = 0;
    startTimer();
  }
}

function showExtraHint() {
  const data = S[currentPath];
  document.getElementById('extra-hint-text').textContent = data.hint2;
  document.getElementById('extra-hint-box').style.display = 'flex';
  document.getElementById('extra-hint-btn').style.display = 'none';
  usedExtraHint = true;
}

function startTimer() {
  timerSeconds = 30;
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) clearInterval(timerInterval);
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = '⏱ ' + timerSeconds;
  el.classList.toggle('timer-urgent', timerSeconds <= 5 && timerSeconds > 0);
}

function castSpell() {
  const input = document.getElementById('spell-input').value.trim();
  const data = S[currentPath];

  if (input === data.answer) {
    clearInterval(timerInterval);
    totalSpells++;
    let earned = 10;
    if (usedExtraHint) earned = 5;
    if (timerSeconds <= 0) earned = Math.max(earned - 3, 2);
    if (failedAttempts === 0 && !usedExtraHint) { earned = 15; perfectSpells++; }
    points += earned;
    document.getElementById('points-display').textContent = points + ' נקודות';
    document.getElementById('timer-display').textContent = '';

    if (data.item && !inventory.includes(data.item)) { inventory.push(data.item); updateInventory(); }

    document.getElementById('spell-section').style.display = 'none';
    document.getElementById('speaker').style.display = 'none';
    document.getElementById('story-display').innerHTML = data.successText + `<div style="text-align:center; margin-top:12px; color: var(--gold); font-size:1.3rem;">+${earned} נקודות ✨</div>`;

    checkAchievements();
    setTimeout(() => { data.choices ? showChoices(data.choices) : showShop(); }, 2200);
  } else {
    failedAttempts++;
    document.getElementById('feedback').textContent = "הלחש נכשל... נסי שוב!";
    document.getElementById('feedback').style.color = "var(--red)";
    document.getElementById('spell-input').style.animation = 'shakeX 0.4s ease';
    setTimeout(() => document.getElementById('spell-input').style.animation = '', 400);
  }
}

function showChoices(choices) {
  const container = document.getElementById('branch-choices');
  container.innerHTML = "";
  container.style.display = 'flex';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => goToStep(c.target);
    container.appendChild(btn);
  });
}

function updateInventory() {
  document.getElementById('inventory').innerHTML = inventory.length ? '🎒 ' + inventory.join(' • ') : '';
}

function showShop() {
  document.getElementById('spell-section').style.display = 'none';
  document.getElementById('branch-choices').style.display = 'none';
  document.getElementById('speaker').style.display = 'none';
  document.getElementById('timer-display').textContent = '';
  document.getElementById('emoji-header').textContent = '🏪';
  document.getElementById('story-display').innerHTML = `
    <div style="text-align:center;">
      <h2 style="color: var(--gold); font-family: 'Cinzel Decorative'; font-size: 1.3rem; margin: 0 0 0.5rem;">המסע הסתיים!</h2>
      <p>צברת <strong style="color: var(--gold);">${points} נקודות</strong> לבית ${currentHouse}</p>
      <p style="font-size: 0.9rem; color: #94a3b8;">קני חפצים מסמטת דיאגון:</p>
    </div>`;
  const shopEl = document.getElementById('shop-section');
  shopEl.style.display = 'block';
  shopEl.innerHTML = '';
  shopItems.forEach(item => {
    const owned = ownedItems.includes(item.id);
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `
      <div class="shop-item-info"><div class="shop-item-name">${item.emoji} ${item.name}</div><div class="shop-item-desc">${item.desc}</div></div>
      ${owned ? '<span style="color:var(--green);">נרכש ✓</span>' : `<button class="shop-buy-btn" ${points >= item.price ? '' : 'disabled'} onclick="buyItem('${item.id}',${item.price})">${item.price} נק'</button>`}`;
    shopEl.appendChild(div);
  });
  const r = document.createElement('button');
  r.className = 'choice-btn'; r.style.marginTop = '1.5rem';
  r.textContent = '🔄 הרפתקה חדשה';
  r.onclick = () => location.reload();
  shopEl.appendChild(r);
}

function buyItem(id, price) {
  if (points >= price && !ownedItems.includes(id)) {
    points -= price; ownedItems.push(id);
    document.getElementById('points-display').textContent = points + ' נקודות';
    showShop(); showToast('🛍️ פריט חדש!');
  }
}

function checkAchievements() {
  if (totalSpells === 1 && !achievements.includes('first')) { achievements.push('first'); showToast('🌟 הלחש הראשון!'); }
  if (perfectSpells >= 3 && !achievements.includes('p3')) { achievements.push('p3'); showToast('⚡ 3 לחשים מושלמים!'); }
  if (inventory.length >= 5 && !achievements.includes('col')) { achievements.push('col'); showToast('🎒 אספנית!'); }
}

function showToast(text) {
  const t = document.createElement('div'); t.className = 'achievement-toast'; t.textContent = text;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

document.getElementById('spell-input').addEventListener('keypress', e => { if (e.key === 'Enter') castSpell(); });
</script>
